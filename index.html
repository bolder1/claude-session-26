  <link rel="preconnect" href="https://ga.jspm.io" crossorigin>
  <style>
    #intro-exit { position: fixed; inset: 0; z-index: 10000; background: #14110b; opacity: 0; pointer-events: none; transition: opacity .4s ease; }
    #intro-exit.is-on { opacity: 1; pointer-events: auto; }
    #scroll-nudge.is-enter { cursor: pointer; }
  </style>
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="intro-exit" aria-hidden="true"></div>

  <!-- 500vh billboard 3D intro runway (cold open) -->
  <div class="threejs-scroll-section">
    <div id="canvas-container"></div>
  </div>
  <img id="threejs-logo" src="assets/miniorange-logo.svg?v=2" alt="miniOrange — Claude Session '26" draggable="false">
  <div id="scroll-nudge" role="status" aria-label="Scroll to meet your new intern">
    <span>SCROLL TO MEET YOUR NEW INTERN</span>
  </div>

  <!-- Site loader -->
  <div id="site-loader" role="status" aria-label="Loading">
    <img class="loader-logo" src="assets/miniorange-logo.svg?v=2" alt="Loading" draggable="false">
    <div class="loader-track"><div class="loader-bar" id="loader-bar"></div></div>
  </div>

  <!-- Loader: min gate, waits for the GLB, then slides up -->
  <script>
  (function () {
    'use strict';
    document.body.style.visibility = 'visible';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow  = 'hidden';
    document.body.style.position  = 'fixed';
    document.body.style.width     = '100%';
    var loader = document.getElementById('site-loader');
    var bar = document.getElementById('loader-bar');
    var exited = false, glbReady = false, minReady = false, progress = 0, rafId = null, uiRevealed = false;
    function revealUI() { if (uiRevealed) return; uiRevealed = true; window.dispatchEvent(new CustomEvent('loaderExited')); }
    function animateBar(target, speed) {
      cancelAnimationFrame(rafId);
      (function tick() {
        progress += (target - progress) * speed;
        if (Math.abs(target - progress) < 0.3) progress = target;
        bar.style.width = progress.toFixed(1) + '%';
        if (progress < target) rafId = requestAnimationFrame(tick);
      })();
    }
    animateBar(70, 0.04);
    function tryExit() { if (glbReady && minReady) { animateBar(100, 0.12); setTimeout(exitLoader, 400); } }
    function exitLoader() {
      if (exited) return; exited = true;
      requestAnimationFrame(function () { requestAnimationFrame(function () {
        document.documentElement.style.overflow = ''; document.body.style.overflow = ''; document.body.style.position = ''; document.body.style.width = '';
        window.scrollTo(0, 0);
        loader.classList.add('is-exiting');
        loader.addEventListener('transitionend', function onDone(e) { if (e.propertyName !== 'transform') return; loader.removeEventListener('transitionend', onDone); if (loader.parentNode) loader.parentNode.removeChild(loader); revealUI(); });
        setTimeout(function () { if (loader.parentNode) loader.parentNode.removeChild(loader); revealUI(); }, 1200);
      }); });
    }
    setTimeout(function () { minReady = true; tryExit(); }, 1200);
    var safetyTimer = setTimeout(function () { glbReady = minReady = true; exitLoader(); }, 12000);
    window.addEventListener('glbLoaded', function () { clearTimeout(safetyTimer); setTimeout(function () { glbReady = true; tryExit(); }, 400); });
  })();
  </script>

  <!-- Logo + scroll-nudge visibility while the intro is active (nudge becomes ENTER near the end, handled by intro.js) -->
  <script>
  (function () {
    'use strict';
    var logo = document.getElementById('threejs-logo');
    var nudge = document.getElementById('scroll-nudge');
    var loaderDone = false, threeJsActive = false;
    function updateVisibility() {
      if (!loaderDone) return;
      if (!threeJsActive) { if (logo) logo.style.opacity = '0'; if (nudge) nudge.style.opacity = '0'; return; }
      if (logo) logo.style.opacity = '1';
      if (nudge) nudge.style.opacity = '1';
      var section = document.querySelector('.threejs-scroll-section');
      var h = section ? section.offsetHeight : 999999;
      if (window.scrollY >= h * 0.9 && logo) logo.style.opacity = '0';   // hide only the logo near the end; nudge stays as ENTER
    }
    window.addEventListener('loaderExited', function () { loaderDone = true; updateVisibility(); });
    window.addEventListener('threeJsCanvas', function (e) { threeJsActive = e.detail.active; updateVisibility(); });
    window.addEventListener('scroll', updateVisibility, { passive: true });
  })();
  </script>

  <!-- Billboard 3D scroll intro (cold open) -->
  <script type="module" src="main.js?v=27"></script>
  <!-- Hand off to /home when the runway completes -->
  <script src="js/intro.js?v=1" defer></script>

</body>
</html>
